# VideoCreation — Default Configuration
# Mirrors relevant settings from Lingo_PERSONAS config.yaml

## TTS Settings
tts:
  method: "edge_tts"        # Options: edge_tts (free), openai (requires OPENAI_API_KEY)
  use_cache: true           # Cache generated audio in .cache/tts to speed up regeneration
  voice: "en-US-GuyNeural"  # Default voice (used when no language is specified)
  rate: "+0%"               # Speaking rate (e.g., "-10%" to slow down, "+5%" to speed up)
  # Per-language default voices (edge_tts voice names)
  # Override any entry here to change the default for that language.
  language_voices:
    en: "en-US-GuyNeural"
    es: "es-AR-TomasNeural"
    zh: "zh-CN-YunxiNeural"
    fr: "fr-FR-HenriNeural"
    de: "de-DE-ConradNeural"
    pt: "pt-BR-AntonioNeural"

## Image Generation
image:
  style: "photorealistic"
  aspect_ratio: "9:16"       # Portrait (TikTok/Shorts/Reels)
  engine: "cloudflare"       # Options: cloudflare, siliconflow, huggingface, pollinations (local only)

## Cloudflare Workers AI
# Credentials are read from env vars: CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN
# Model: @cf/black-forest-labs/flux-1-schnell (FLUX, fast, high quality)
cloudflare:
  model: "@cf/black-forest-labs/flux-1-schnell"
  timeout: 90
  max_retries: 2

## Pollinations Direct API
pollinations:
  timeout: 90               # seconds per image request
  retries: 3                # attempts before giving up on a prompt
  retry_delay: 5            # seconds to wait between retries
  inter_image_delay: 2      # seconds to wait between successive images
  base_url: "https://image.pollinations.ai/prompt/"

## Video Output
video:
  width: 1080
  height: 1920
  fps: 30
  bitrate: "8000k"
  default_format: "mp4"

## Subtitle Settings
subtitles:
  font: "/usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf"
  font_size: 56        # was 28 — doubled as requested
  font_color: "white"
  stroke_color: "black"
  stroke_width: 2
  position: "bottom"
  margin: 80
  words_per_second: 2.5
  max_words_per_chunk: 8
  max_chars_per_line: 42   # wrap text before this many characters per line

## Transitions
transitions:
  fade_duration: 0.5
  image_duration: 3.0
